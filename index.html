      {icon:"🥇",name:"Pódio",desc:"Está no Top 3",earned:pts>0&&rankIndex>=0&&rankIndex<3,prog:rankIndex>=0?`${rankIndex+1}º`:"—",lvl:0},
      {icon:"👑",name:"Líder",desc:"Está em 1º no ranking",earned:pts>0&&rankIndex===0,prog:rankIndex>=0?`${rankIndex+1}º`:"—",lvl:0},
    ];

  // ── TeamSelect ──
  const TeamSelect=({value,onChange,disabled,options})=>{
    const opts=value&&!options.includes(value)?[value,...options]:options;
    return <select value={value||""} onChange={e=>onChange(e.target.value)} disabled={disabled} className={"w-full px-3 py-2 border-2 rounded-xl text-sm font-medium focus:outline-none "+(disabled?"bg-gray-50 border-gray-100 text-gray-400 cursor-not-allowed":"border-gray-200 focus:border-emerald-400")}><option value="">Selecione o time...</option>{opts.map((o,i)=><option key={i} value={o}>{o}</option>)}</select>;
  };

  // ── Group BetRow / ResultRow / MatchCard ──
  function BetRow({m,bet,canEdit,onSave}){
    const[g1,setG1]=useState(bet.guess?bet.guess.split("-")[0]:"");
    const[g2,setG2]=useState(bet.guess?bet.guess.split("-")[1]:"");
    const SB=({value,onChange,locked})=>locked?<div className="w-10 h-10 rounded-xl bg-orange-50 border-2 border-orange-100 flex items-center justify-center font-bold text-lg text-orange-400">{value||"–"}</div>:<div className="w-10 h-10 rounded-xl border-2 border-gray-200 focus-within:border-emerald-400 flex items-center justify-center"><input type="number" min="0" max="20" value={value} onChange={e=>onChange(e.target.value)} className="w-full h-full text-center font-bold text-lg bg-transparent focus:outline-none"/></div>;
    return(<div><div className="flex items-center gap-2"><div className="flex items-center gap-2 flex-1 justify-end"><span className="font-semibold text-gray-800 text-sm text-right leading-tight">{tname(m.team1)}</span><Flag name={m.team1}/></div><div className="flex items-center gap-1 shrink-0"><SB value={g1} onChange={setG1} locked={!canEdit}/><span className="text-gray-400 font-bold text-sm px-0.5">×</span><SB value={g2} onChange={setG2} locked={!canEdit}/></div><div className="flex items-center gap-2 flex-1"><Flag name={m.team2}/><span className="font-semibold text-gray-800 text-sm leading-tight">{tname(m.team2)}</span></div></div>{canEdit&&<button onClick={()=>{if(g1!==''&&g2!=='')onSave(g1,g2);}} disabled={g1===''||g2===''} className={`w-full mt-3 py-2 rounded-xl font-semibold text-sm transition disabled:bg-gray-200 disabled:text-gray-400 text-white ${bet.guess?"bg-red-500 hover:bg-red-600":"bg-emerald-500 hover:bg-emerald-600"}`}>{bet.guess?"Alterar aposta":"Enviar aposta"}</button>}</div>);
  }
  function ResultRow({m,pts}){
    const[g1,g2]=m.result.split("-");
    const c=pts===PTS_EXATO?"bg-emerald-500 text-white":pts===PTS_RESULTADO?"bg-blue-500 text-white":"bg-gray-100 text-gray-600";
    return(<div className="flex items-center gap-2"><div className="flex items-center gap-2 flex-1 justify-end"><span className="font-semibold text-gray-800 text-sm text-right">{tname(m.team1)}</span><Flag name={m.team1}/></div><div className="flex items-center gap-1 shrink-0"><div className={`w-10 h-10 rounded-xl flex items-center justify-center font-bold text-lg ${c}`}>{g1}</div><span className="text-gray-400 font-bold text-sm px-0.5">×</span><div className={`w-10 h-10 rounded-xl flex items-center justify-center font-bold text-lg ${c}`}>{g2}</div></div><div className="flex items-center gap-2 flex-1"><Flag name={m.team2}/><span className="font-semibold text-gray-800 text-sm">{tname(m.team2)}</span></div></div>);
  }
  function MatchCard({m,bet,isAdmin,resultDrafts,setResultDrafts,saveResult,saveBet}){
    const locked=isLocked(m.kickoff);const canEdit=!locked&&bet.changes<1;
    const pts=m.result?betPoints(bet.guess,m.result):null;
    return(<div className="bg-white rounded-2xl shadow-sm mb-3 overflow-hidden border border-gray-100">
      <div className="px-4 py-2.5 flex justify-between items-center" style={{background:"linear-gradient(135deg,#064e3b,#065f46)"}}>
        <div><span className="text-white text-xs font-bold">Grupo {m.group}</span><span className="text-emerald-300 text-xs"> · Rodada {roundOf(m)} · {fmtDate(m.kickoff)} às {fmtTime(m.kickoff)}</span></div>
        {m.result?<span className={"text-xs font-bold px-2 py-1 rounded-full "+(pts>0?"bg-emerald-400 text-white":"bg-white/20 text-white")}>{pts>0?"+"+pts+" pts":"0 pts"}</span>:locked?<span className="text-xs font-bold px-2 py-1 rounded-full bg-orange-400/80 text-white">🔒 Fechado</span>:<span className="text-xs font-bold px-2 py-1 rounded-full bg-yellow-400/80 text-white">⏰ Aberto</span>}
      </div>
      <div className="px-4 py-4">

        {!m.result&&!canEdit&&bet.changes>=1&&<p className="mt-2 text-xs text-orange-400">🔒 Alteração já utilizada</p>}
        {isAdmin&&(<div className="mt-3 flex gap-2 bg-purple-50 rounded-xl p-2 border border-purple-100"><input value={resultDrafts[m.id]!==undefined?resultDrafts[m.id]:(m.result||"")} onChange={e=>setResultDrafts({...resultDrafts,[m.id]:e.target.value})} placeholder="2-1" className="flex-1 px-3 py-1.5 text-center border border-purple-200 rounded-lg text-sm font-bold focus:outline-none focus:border-purple-400"/><button onClick={()=>saveResult(m)} className="bg-purple-600 hover:bg-purple-700 text-white text-sm px-4 rounded-lg font-medium">Lançar</button></div>)}
      </div>
    </div>);
  }

  // ── BRACKET CONNECTOR ──
  function BracketConnector({phaseI,slots}){
    const{stride:sp,firstTop:fp}=bkLayout(phaseI);
    const cx=BK.connW/2; const lines=[];
    for(let i=0;i<slots;i+=2){
      const y1=fp+i*sp+BK.cardH/2, y2=fp+(i+1)*sp+BK.cardH/2, ym=(y1+y2)/2;
      lines.push(<line key={`a${i}`} x1="0" y1={y1} x2={cx} y2={y1} stroke="#10b981" strokeWidth="1.5" opacity="0.8"/>);
      lines.push(<line key={`b${i}`} x1={cx} y1={y1} x2={cx} y2={y2} stroke="#10b981" strokeWidth="1.5" opacity="0.8"/>);
      lines.push(<line key={`c${i}`} x1="0" y1={y2} x2={cx} y2={y2} stroke="#10b981" strokeWidth="1.5" opacity="0.8"/>);
      lines.push(<line key={`d${i}`} x1={cx} y1={ym} x2={BK.connW} y2={ym} stroke="#10b981" strokeWidth="1.5" opacity="0.8"/>);
    }
    return <svg width={BK.connW} height={BK.totalH} style={{flexShrink:0,marginTop:26}} fill="none">{lines}</svg>;
  }

  // ── KO MODAL ──

    const handleG2=v=>{setG2(v);if(g1!==''&&v!==''){const n1=parseInt(g1,10),n2=parseInt(v,10);if(!isNaN(n1)&&!isNaN(n2)&&n1!==n2){setPick(n1>n2?'team1':'team2');}}};

    const buildKickoffISO=()=>{if(!aDate||!aTime)return null;try{const[hh,mm]=aTime.split(':');const d=new Date(`${aDate}T${hh.padStart(2,'0')}:${mm.padStart(2,'0')}:00-03:00`);return isNaN(d)?null:d.toISOString();}catch{return null;}};

            <div>
              <p className="font-bold text-gray-800 text-base">{phase?.label} — Jogo {m.slot}</p>

            </div>

          </div>
          {m.result?(
            <div>
              <div className="flex items-center gap-2 mb-3">
                <div className="flex items-center gap-2 flex-1 justify-end"><span className={`font-bold text-sm ${m.winner==='team1'?'text-emerald-600':'text-gray-700'}`}>{tname(t1)}</span><Flag name={m.team1}/></div>
                <div className="flex gap-1 items-center shrink-0">
                  <div className={`w-10 h-10 rounded-xl flex items-center justify-center font-bold text-lg ${m.winner==='team1'?'bg-emerald-500 text-white':'bg-gray-100 text-gray-600'}`}>{m.result.split('-')[0]}</div>
                  <span className="text-gray-400 font-bold">×</span>
                  <div className={`w-10 h-10 rounded-xl flex items-center justify-center font-bold text-lg ${m.winner==='team2'?'bg-emerald-500 text-white':'bg-gray-100 text-gray-600'}`}>{m.result.split('-')[1]}</div>
                </div>
                <div className="flex items-center gap-2 flex-1"><Flag name={m.team2}/><span className={`font-bold text-sm ${m.winner==='team2'?'text-emerald-600':'text-gray-700'}`}>{tname(t2)}</span></div>
              </div>

              {koBet?.guess&&<div className="bg-gray-50 rounded-xl p-3 text-sm"><p>Sua aposta: <b>{koBet.guess}</b> · Avança: <b>{tname(m[koBet.pick]||koBet.pick||'')}</b></p>{pts>0?<p className="text-emerald-600 font-bold mt-1">+{pts} pontos! 🎉</p>:<p className="text-red-400 mt-1">Sem pontos desta vez.</p>}</div>}
            </div>
          ):canEdit?(
            <div>
              <div className="flex items-center gap-2 mb-4">
                <div className="flex items-center gap-2 flex-1 justify-end"><span className="font-semibold text-sm text-right leading-tight">{tname(t1)}</span><Flag name={m.team1}/></div>

                  <span className="text-gray-400 font-bold">×</span>
                  <div className="w-10 h-10 rounded-xl border-2 border-gray-200 focus-within:border-emerald-400 flex items-center justify-center"><input type="number" min="0" max="20" value={g2} onChange={e=>handleG2(e.target.value)} className="w-full h-full text-center font-bold text-lg bg-transparent focus:outline-none"/></div>

              </div>

          ):(
            <div>
              <div className="flex items-center justify-center gap-4 mb-3"><div className="text-center"><Flag name={m.team1}/><p className="text-xs font-semibold mt-1">{tname(t1)}</p></div><span className="text-2xl font-bold text-gray-300">×</span><div className="text-center"><Flag name={m.team2}/><p className="text-xs font-semibold mt-1">{tname(t2)}</p></div></div>
              {koBet?.guess?(<div className="bg-orange-50 rounded-xl p-3 text-sm text-center"><p>Sua aposta: <b>{koBet.guess}</b> · Avança: <b>{tname(m[koBet.pick]||koBet.pick||'')}</b></p><p className="text-orange-500 text-xs mt-1">{koBet.changes>=1?'🔒 Alteração já utilizada':'🔒 Apostas fechadas'}</p></div>):(<p className="text-center text-gray-400 text-sm">{!m.team1||!m.team2?'Times ainda não definidos.':'Apostas encerradas.'}</p>)}
            </div>

          {isAdmin&&(
            <div className="mt-4 pt-4 border-t border-gray-100">
              <p className="text-xs font-bold text-purple-600 mb-3">⚙️ Controles do Admin</p>
              <div className="grid grid-cols-2 gap-2 mb-2">

                <div><label className="text-xs text-gray-500">Time 2</label><select value={eT2} onChange={e=>{setET2(e.target.value);if(e.target.value)onSaveKO(m.id,{team2:e.target.value});}} className="w-full px-2 py-1.5 border border-gray-200 rounded-lg text-xs focus:outline-none focus:border-purple-400 mt-0.5"><option value="">Selecione o time...</option>{Object.entries(T).sort((a,b)=>a[1].localeCompare(b[1],'pt')).map(([en,pt])=><option key={en} value={en}>{pt}</option>)}</select></div>

  // ── BRACKET TAB ──

    const[openId,setOpenId]=useState(null);

              </div>
              {(()=>{
                const totalUsers=allUsers.length;const submitted=allUsers.filter(u=>u.predSubmitted).length;
                const totalBets=allUsers.reduce((s,u)=>s+Object.values(u.bets||{}).filter(b=>b&&b.guess).length,0);
                const avgBets=totalUsers?Math.round(totalBets/totalUsers):0;
                const tally=field=>{const o={};allUsers.forEach(u=>{const v=(u.predictions||{})[field];if(v&&v.trim()){const k=v.trim();o[k]=(o[k]||0)+1;}});return Object.entries(o).sort((a,b)=>b[1]-a[1]).slice(0,6);};
                const Bar=({label,count,max,color})=>(<div className="flex items-center gap-2 mb-1.5"><span className="text-xs text-gray-600 w-24 truncate shrink-0">{label}</span><div className="flex-1 bg-gray-100 rounded-full h-3 min-w-0"><div className="h-3 rounded-full" style={{width:(count/max*100)+"%",background:color}}></div></div><span className="text-xs font-bold text-gray-600 w-5 text-right shrink-0">{count}</span></div>);
                const predColors=["#10b981","#3b82f6","#f59e0b","#8b5cf6","#ec4899"];
                return(<div className="bg-white rounded-2xl shadow-sm p-4 border border-gray-100">
                  <h3 className="font-bold text-gray-800 mb-3">📊 Visão geral</h3>
                  <div className="grid grid-cols-2 gap-2 mb-4">
                    <div className="bg-emerald-50 rounded-xl p-3 text-center"><p className="text-2xl font-bold text-emerald-600">{totalUsers}</p><p className="text-xs text-gray-500">Participantes</p></div>
                    <div className="bg-blue-50 rounded-xl p-3 text-center"><p className="text-2xl font-bold text-blue-600">{totalUsers?Math.round(submitted/totalUsers*100):0}%</p><p className="text-xs text-gray-500">Enviaram previsões</p></div>
                    <div className="bg-purple-50 rounded-xl p-3 text-center"><p className="text-2xl font-bold text-purple-600">{totalBets}</p><p className="text-xs text-gray-500">Apostas totais</p></div>
                    <div className="bg-amber-50 rounded-xl p-3 text-center"><p className="text-2xl font-bold text-amber-600">{avgBets}</p><p className="text-xs text-gray-500">Média por pessoa</p></div>
                  </div>
                  {PRED_LABELS.map((p,pi)=>{
                    const data=tally(p.key);const maxV=data.length?data[0][1]:1;
                    const color=predColors[pi]||"#6b7280";
                    const isTeam=["champion","vicechampion","third"].includes(p.key);
                    return(<div key={p.key} className="mb-4 last:mb-0">
                      <p className="text-xs font-semibold text-gray-600 mb-1.5">{p.label}</p>
                      {data.length===0?<p className="text-xs text-gray-400">Nenhum palpite ainda.</p>:<div>{data.map(([n,c],i)=><Bar key={i} label={isTeam?tname(n):n} count={c} max={maxV} color={color}/>)}</div>}
                    </div>);
                  })}
                </div>);
              })()}
              <div className="bg-white rounded-2xl shadow-sm p-4 border border-gray-100"><h3 className="font-bold text-gray-800 mb-2">🏅 Resultados finais (previsões)</h3><p className="text-xs text-gray-500 mb-3">Preencha ao fim da Copa. Salva ao clicar fora.</p>{PRED_LABELS.map(p=>{const isTeam=["champion","vicechampion","third"].includes(p.key);return(<div key={p.key} className="flex items-center gap-2 mb-2"><span className="text-xs text-gray-600 w-36">{p.label}</span>{isTeam?<select value={(official||{})[p.key]||""} onChange={e=>saveOfficial(p.key,e.target.value)} className="flex-1 px-2 py-1.5 border border-gray-200 rounded-lg text-sm focus:outline-none focus:border-emerald-400"><option value="">Selecione...</option>{teamOptions.map((o,i)=><option key={i} value={o}>{o}</option>)}</select>:<input defaultValue={(official||{})[p.key]||""} onBlur={e=>saveOfficial(p.key,e.target.value)} placeholder="resposta oficial" className="flex-1 px-2 py-1.5 border border-gray-200 rounded-lg text-sm focus:outline-none focus:border-emerald-400"/>}</div>);})}<p className="text-xs text-gray-400 mt-2">Salva automaticamente ao clicar fora do campo.</p></div>
              <p className="text-xs text-gray-400">💡 Para lançar placares da Fase de Grupos use o campo roxo na aba <b>Fase de Grupos</b>. Para o Mata-Mata, toque no jogo na aba <b>Mata-Mata</b>.</p>
            </div>
          )}
        </main>
        <footer className="text-center text-xs text-gray-400 py-6 border-t border-gray-100 mt-4">⚽ Bolão HC Copa 2026 · HCmaster · <a href="https://wa.me/5519981719881" className="text-emerald-500 hover:underline">WhatsApp</a></footer>
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
